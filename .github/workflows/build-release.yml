name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        python build_executable.py

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: LTC-Timecode-Player-Windows
        path: release/LTC-Timecode-Player.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1 python3-tk

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile \
          --add-data "web:web" \
          --hidden-import=eel \
          --hidden-import=numpy \
          --hidden-import=scipy \
          --hidden-import=soundfile \
          --hidden-import=matplotlib \
          --hidden-import=matplotlib.backends.backend_agg \
          --hidden-import=tkinter \
          --hidden-import=tkinter.filedialog \
          --collect-all eel \
          app.py --name=LTC-Timecode-Player-Linux

    - name: Make executable
      run: chmod +x dist/LTC-Timecode-Player-Linux

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: LTC-Timecode-Player-Linux
        path: dist/LTC-Timecode-Player-Linux

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        brew install libsndfile
        brew install python-tk@3.11

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile \
          --add-data "web:web" \
          --hidden-import=eel \
          --hidden-import=numpy \
          --hidden-import=scipy \
          --hidden-import=soundfile \
          --hidden-import=matplotlib \
          --hidden-import=matplotlib.backends.backend_agg \
          --hidden-import=tkinter \
          --hidden-import=tkinter.filedialog \
          --collect-all eel \
          app.py --name=LTC-Timecode-Player-macOS

    - name: Make executable
      run: chmod +x dist/LTC-Timecode-Player-macOS

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: LTC-Timecode-Player-macOS
        path: dist/LTC-Timecode-Player-macOS

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: LTC-Timecode-Player-Windows
        path: artifacts/windows

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: LTC-Timecode-Player-Linux
        path: artifacts/linux

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: LTC-Timecode-Player-macOS
        path: artifacts/macos

    - name: Set executable permissions on Linux and macOS binaries
      run: |
        chmod +x artifacts/linux/LTC-Timecode-Player-Linux
        chmod +x artifacts/macos/LTC-Timecode-Player-macOS

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: LTC Timecode Player ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          artifacts/windows/LTC-Timecode-Player.exe
          artifacts/linux/LTC-Timecode-Player-Linux
          artifacts/macos/LTC-Timecode-Player-macOS
          release/USAGE.txt
          release/README.md
          release/LICENSE
        body: |
          ## LTC Timecode Player ${{ github.ref_name }}

          A professional Linear Time Code (LTC) analysis and playback tool with a modern web-based interface. Designed for broadcast engineers, post-production professionals, and audio engineers.

          ---

          ### Downloads

          | Platform | File | Notes |
          |----------|------|-------|
          | **Windows** | `LTC-Timecode-Player.exe` | No installation required |
          | **Linux** | `LTC-Timecode-Player-Linux` | Requires `libsndfile1` |
          | **macOS** | `LTC-Timecode-Player-macOS` | macOS 12+ (arm64/x86_64) |

          ---

          ### Installation

          **Windows**
          1. Download `LTC-Timecode-Player.exe`
          2. Double-click to run — no installation required
          3. If Windows Defender SmartScreen appears, click **More info → Run anyway**

          **Linux**
          ```bash
          # Install required system library
          sudo apt-get install libsndfile1    # Debian/Ubuntu
          # or
          sudo dnf install libsndfile         # Fedora/RHEL

          # Download and run
          chmod +x LTC-Timecode-Player-Linux
          ./LTC-Timecode-Player-Linux
          ```

          **macOS**
          ```bash
          chmod +x LTC-Timecode-Player-macOS
          ./LTC-Timecode-Player-macOS
          ```
          > If macOS Gatekeeper blocks the app: **System Settings → Privacy & Security → Open Anyway**

          ---

          ### Features

          - **Audio Format Support**: WAV, AIFF, FLAC
          - **Frame Rate Detection**: Automatic detection of 23.976, 24, 25, 29.97, 30 fps
          - **Bi-phase Mark Decoding**: Professional SMPTE/EBU LTC decoder
          - **Signal Quality Analysis**: Real-time integrity assessment and validation
          - **Waveform Visualization**: High-quality audio waveform display
          - **Frame-Accurate Playback**: Step through timecode frame by frame
          - **Export Reports**: Detailed analysis export

          ---

          ### System Requirements

          | | Windows | Linux | macOS |
          |---|---|---|---|
          | **OS** | Windows 10+ | Ubuntu 20.04+ / Fedora 35+ | macOS 12+ |
          | **Browser** | Chrome, Edge, Firefox | Chrome, Firefox | Safari, Chrome, Firefox |
          | **RAM** | 4 GB recommended | 4 GB recommended | 4 GB recommended |
          | **Dependency** | — | `libsndfile1` | — |

          ---

          See `USAGE.txt` for detailed usage instructions and troubleshooting.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
